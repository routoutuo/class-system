<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>班级管理系统 - 聊天界面</title>
<style>
    body {
        margin: 0;
        font-family: "Microsoft YaHei", sans-serif;
        background: #f4f6f8;
        display: flex;
        height: 100vh;
    }

    /* 左侧面板 */
    .sidebar {
        width: 220px;
        background: #1f2d3d;
        color: white;
        padding: 20px;
    }

    .sidebar h2 {
        font-size: 18px;
        margin-bottom: 20px;
    }

    .role {
        font-size: 14px;
        color: #ccc;
        margin-bottom: 20px;
    }

    .menu {
        font-size: 14px;
        line-height: 28px;
        cursor: pointer;
    }

    .menu:hover {
        color: #4fc3f7;
    }

    /* 主区域 */
    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    /* 聊天窗口 */
    .chat-box {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
    }

    .msg {
        margin: 10px 0;
        max-width: 60%;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 14px;
    }

    .user {
        background: #d1ecf1;
        align-self: flex-end;
        margin-left: auto;
    }

    .ai {
        background: #ffffff;
        border: 1px solid #ddd;
    }

    /* 输入区域 */
    .input-area {
        display: flex;
        padding: 10px;
        background: white;
        border-top: 1px solid #ddd;
    }

    input {
        flex: 1;
        padding: 10px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
    }

    button {
        margin-left: 10px;
        padding: 10px 16px;
        background: #4fc3f7;
        border: none;
        color: white;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background: #039be5;
    }

</style>
</head>

<body>

<!-- 左侧 -->
<div class="sidebar">
    <h2>班级管理系统</h2>
    <div class="role">当前身份：班主任</div>

    <div class="menu">学生列表</div>
    <div class="menu">出勤统计</div>
    <div class="menu">作业情况</div>
    <div class="menu">班干部权限</div>
</div>

<!-- 主聊天区 -->
<div class="main">

    <div class="chat-box" id="chatBox">
        <div class="msg ai">系统：欢迎使用班级管理系统，请输入指令。</div>
    </div>

    <div class="input-area">
        <input id="input" placeholder="例如：记录张三迟到 / 统计本周作业情况">
        <button onclick="sendMsg()">发送</button>
    </div>

</div>

<script>
function sendMsg() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    const chatBox = document.getElementById("chatBox");

    // 用户消息
    const userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.innerText = text;
    chatBox.appendChild(userMsg);

    // 模拟AI回复（后面你接后端就删掉这一段）
    const aiMsg = document.createElement("div");
    aiMsg.className = "msg ai";
    aiMsg.innerText = "已收到指令：" + text + "（这里后续接AI处理）";
    
    setTimeout(() => {
        chatBox.appendChild(aiMsg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 300);

    input.value = "";
}
</script>

</body>
</html>
